<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custos Aurum™ — YourAI.Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:      #0D1F5C;
      --gold:      #F5A623;
      --steel:     #4F78B8;
      --bluemist:  #D6E4F0;
      --warmwhite: #FAFAF7;
      --midgray:   #6B7280;
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--warmwhite); overflow: hidden; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 50% 38%, rgba(245,166,35,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 75% 55% at 50% 100%, rgba(79,120,184,0.13) 0%, transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(214,228,240,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(214,228,240,0.035) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }
    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 28px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 44px;
      opacity: 0; animation: rise 0.9s ease 0.1s forwards;
    }
    .logo img { height: 36px; width: auto; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.8rem, 8vw, 7rem);
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--warmwhite);
      margin-bottom: 6px;
      opacity: 0; animation: rise 0.9s ease 0.25s forwards;
    }
    h1 .tm { font-size: 0.38em; vertical-align: super; color: var(--gold); font-weight: 400; }
    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.9rem, 1.6vw, 1.1rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 36px;
      opacity: 0; animation: rise 0.9s ease 0.4s forwards;
    }
    .rule { width: 44px; height: 1px; background: rgba(245,166,35,0.3); margin: 0 auto 36px; opacity: 0; animation: rise 0.9s ease 0.5s forwards; }
    .desc {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.3vw, 0.97rem);
      line-height: 2.1;
      color: rgba(250,250,247,0.52);
      margin-bottom: 4px;
      opacity: 0; animation: rise 0.9s ease 0.62s forwards;
    }
    .desc em { color: rgba(250,250,247,0.82); font-style: normal; }
    .btn {
      display: inline-block;
      margin-top: 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none;
      color: var(--navy); background: var(--gold);
      padding: 15px 40px;
      transition: background 0.2s, transform 0.2s;
      opacity: 0; animation: rise 0.9s ease 0.78s forwards;
    }
    .btn:hover { background: #f8b83a; transform: translateY(-2px); }
    .footer {
      position: fixed; bottom: 26px; left: 0; right: 0;
      text-align: center;
      font-size: 0.66rem; font-weight: 300; letter-spacing: 0.09em;
      color: rgba(250,250,247,0.18);
      opacity: 0; animation: rise 0.9s ease 0.9s forwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .logo { margin-bottom: 32px; }
      .logo img { height: 30px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="logo">
    <img src="https://aurios.io/images/auri-logo-primary.png" alt="Auri by AuriOS™" />
  </div>
  <h1>Custos Aurum<span class="tm">™</span></h1>
  <p class="subtitle">Your memory. Held in common.</p>
  <div class="rule"></div>
  <p class="desc">Your memories. <em>Owned by you.</em></p>
  <p class="desc">Governed by its Members.</p>
  <p class="desc"><em>Your safe deposit box. Not their server.</em></p>
  <p class="desc" style="margin-top:10px;font-size:clamp(0.76rem,1.1vw,0.86rem);letter-spacing:0.06em;">Coming soon.</p>
  <a class="btn" href="https://aurios.io">← Return to AuriOS™</a>
</div>
<p class="footer">© 2026 AuriOS™ · YourAI.Host · Houston, Texas</p>
</body>
</html>
